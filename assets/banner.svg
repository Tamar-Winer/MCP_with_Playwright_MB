<svg width="860" height="220" viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f0c29"/>
      <stop offset="50%"  stop-color="#1a1a4e"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#b0bec5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .star { animation: twinkle 3s ease-in-out infinite; }
      .star2 { animation: twinkle 2s ease-in-out infinite 0.7s; }
      .star3 { animation: twinkle 4s ease-in-out infinite 1.4s; }
      .cloud-l { animation: driftL 9s ease-in-out infinite; }
      .cloud-r { animation: driftR 11s ease-in-out infinite; }
      .sun-wrap { animation: pulseSun 4s ease-in-out infinite; transform-origin: 720px 95px; }
      .ray-wrap { animation: spinRay 18s linear infinite; transform-origin: 720px 95px; }
      .rain1 { animation: rainDrop 1.6s linear infinite; }
      .rain2 { animation: rainDrop 1.6s linear infinite 0.55s; }
      .rain3 { animation: rainDrop 1.6s linear infinite 1.1s; }
      .title { animation: fadeUp 1.2s ease-out forwards; }
      .subtitle { animation: fadeUp 1.2s ease-out 0.3s forwards; opacity: 0; }
      .tag { animation: fadeUp 1.2s ease-out 0.6s forwards; opacity: 0; }

      @keyframes twinkle {
        0%,100% { opacity: 0.9; r: 2; }
        50%      { opacity: 0.2; r: 1; }
      }
      @keyframes driftL {
        0%,100% { transform: translateX(0px);  }
        50%      { transform: translateX(22px); }
      }
      @keyframes driftR {
        0%,100% { transform: translateX(0px);   }
        50%      { transform: translateX(-18px); }
      }
      @keyframes pulseSun {
        0%,100% { opacity: 1;   }
        50%      { opacity: 0.8; }
      }
      @keyframes spinRay {
        from { transform: rotate(0deg);   }
        to   { transform: rotate(360deg); }
      }
      @keyframes rainDrop {
        0%   { transform: translateY(-8px);  opacity: 0; }
        30%  { opacity: 1; }
        100% { transform: translateY(28px);  opacity: 0; }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0);    }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" rx="18" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <circle class="star"  cx="30"  cy="22" r="2"   fill="white"/>
  <circle class="star2" cx="75"  cy="45" r="1.5" fill="white"/>
  <circle class="star3" cx="115" cy="18" r="2"   fill="white"/>
  <circle class="star"  cx="800" cy="28" r="1.5" fill="white"/>
  <circle class="star2" cx="840" cy="18" r="2"   fill="white"/>
  <circle class="star3" cx="780" cy="50" r="1.5" fill="white"/>
  <circle class="star"  cx="430" cy="14" r="1.5" fill="white"/>
  <circle class="star2" cx="480" cy="30" r="1"   fill="#90caf9"/>
  <circle class="star3" cx="360" cy="20" r="1.5" fill="white"/>

  <!-- ── LEFT SIDE — Israel / Rain ── -->
  <g class="cloud-l">
    <!-- main cloud body -->
    <ellipse cx="135" cy="78"  rx="58" ry="28"  fill="url(#cloudGrad)" opacity="0.92"/>
    <ellipse cx="105" cy="92"  rx="40" ry="22"  fill="url(#cloudGrad)" opacity="0.92"/>
    <ellipse cx="165" cy="92"  rx="34" ry="18"  fill="url(#cloudGrad)" opacity="0.92"/>
    <!-- rain drops -->
    <line class="rain1" x1="110" y1="112" x2="106" y2="133" stroke="#64b5f6" stroke-width="2.5" stroke-linecap="round"/>
    <line class="rain2" x1="127" y1="112" x2="123" y2="133" stroke="#64b5f6" stroke-width="2.5" stroke-linecap="round"/>
    <line class="rain3" x1="144" y1="112" x2="140" y2="133" stroke="#64b5f6" stroke-width="2.5" stroke-linecap="round"/>
    <line class="rain2" x1="161" y1="112" x2="157" y2="133" stroke="#90caf9" stroke-width="2"   stroke-linecap="round"/>
  </g>
  <!-- flag + label -->
  <text x="98"  y="175" font-size="30" text-anchor="middle" font-family="Segoe UI Emoji, Arial">🇮🇱</text>
  <text x="170" y="175" font-size="30" text-anchor="middle" font-family="Segoe UI Emoji, Arial">☔</text>
  <text x="135" y="200" font-size="11.5" fill="#90caf9" text-anchor="middle" font-family="'Segoe UI',Arial" letter-spacing="0.5">weather2day.co.il · Playwright</text>

  <!-- ── CENTER — Title ── -->
  <text class="title" x="430" y="82"
        text-anchor="middle" fill="white"
        font-size="34" font-weight="700"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        filter="url(#glow)">
    🌦️ Weather MCP
  </text>
  <text class="subtitle" x="430" y="118"
        text-anchor="middle" fill="#a0aec0"
        font-size="15.5"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        letter-spacing="0.8">
    Claude · MCP SDK · Playwright · NWS API
  </text>
  <text class="tag" x="430" y="152"
        text-anchor="middle" fill="#6c63ff"
        font-size="13"
        font-family="'Courier New', monospace"
        letter-spacing="1">
    Browser Automation  ·  RAG  ·  AI Agent
  </text>

  <!-- ── RIGHT SIDE — USA / Sun ── -->
  <!-- spinning rays -->
  <g class="ray-wrap">
    <line x1="720" y1="50"  x2="720" y2="32"  stroke="#ffd200" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="720" y1="140" x2="720" y2="158" stroke="#ffd200" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="675" y1="95"  x2="657" y2="95"  stroke="#ffd200" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="765" y1="95"  x2="783" y2="95"  stroke="#ffd200" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="688" y1="63"  x2="675" y2="50"  stroke="#ffd200" stroke-width="3"   stroke-linecap="round" opacity="0.7"/>
    <line x1="752" y1="127" x2="765" y2="140" stroke="#ffd200" stroke-width="3"   stroke-linecap="round" opacity="0.7"/>
    <line x1="752" y1="63"  x2="765" y2="50"  stroke="#ffd200" stroke-width="3"   stroke-linecap="round" opacity="0.7"/>
    <line x1="688" y1="127" x2="675" y2="140" stroke="#ffd200" stroke-width="3"   stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- sun disk -->
  <g class="sun-wrap">
    <circle cx="720" cy="95" r="30" fill="url(#sunGrad)" filter="url(#glow)"/>
    <circle cx="720" cy="95" r="23" fill="#FFD700"/>
    <circle cx="720" cy="95" r="16" fill="#FFF176" opacity="0.6"/>
  </g>
  <!-- small cloud in front of sun -->
  <g class="cloud-r">
    <ellipse cx="755" cy="122" rx="32" ry="16" fill="white" opacity="0.88"/>
    <ellipse cx="736" cy="130" rx="23" ry="13" fill="white" opacity="0.88"/>
    <ellipse cx="774" cy="130" rx="18" ry="10" fill="white" opacity="0.88"/>
  </g>
  <!-- flag + label -->
  <text x="675" y="175" font-size="30" text-anchor="middle" font-family="Segoe UI Emoji, Arial">🇺🇸</text>
  <text x="755" y="175" font-size="30" text-anchor="middle" font-family="Segoe UI Emoji, Arial">☀️</text>
  <text x="720" y="200" font-size="11.5" fill="#ffd200" text-anchor="middle" font-family="'Segoe UI',Arial" letter-spacing="0.5">api.weather.gov · NWS API</text>

  <!-- bottom border glow line -->
  <line x1="80" y1="214" x2="780" y2="214" stroke="#6c63ff" stroke-width="1.5" opacity="0.4"/>
</svg>
